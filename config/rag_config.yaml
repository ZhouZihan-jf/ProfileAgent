# RAG API 配置

# API 基础地址
base_url: "http://localhost:8000/api/v1"

# 认证密钥 (可选，留空则不认证)
api_key: ""

# 请求超时(秒)
timeout: 30

# 最大重试次数
max_retries: 2

# 默认返回文档数
default_top_k: 5

# 检索结果最低相关性分数阈值（低于此阈值的文档将被过滤）
min_score: 0.3

# RAG 充分性检查最大重试轮次（每次重试会用修正后的查询重新检索）
rag_loop_max: 2

# 可用端点
endpoints:
  - name: search
    path: /rag/search
    method: POST
    headers: {}

  - name: retrieve
    path: /rag/retrieve
    method: POST
    headers:
      X-Retrieval-Mode: hybrid
